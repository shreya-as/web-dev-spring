<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lists</title>
  </head>
  <body>
    <h1>Lists</h1>
    <!-- 1. Unordered Lists -->
    <h2>Unordered Lists</h2>
    <ul type="square">
      <li>Milk</li>
      <li>Eggs</li>
    </ul>
    <!-- Ordered Lists -->
    <h2>Ordered Lists</h2>
    <ol type="A">
      <li>Apple</li>
      <li>Orange</li>
    </ol>
    <!-- Description Lists  -->
    <dl>
      <dt>HTML</dt>
      <dd>A markup language for web pages.</dd>
    </dl>
  </body>
</html>
