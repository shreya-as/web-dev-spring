<!DOCTYPE html>
<!-- root element -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- block elements -->
    <h1>Hello World</h1>
    <h2>Welcome to my first web page.</h2>
    <p>
       This is a paragraph tag. 
    </p> 
    
    <!-- Inline Elements -->
    <b>
        This is a bold text.
    </b> 
    <br>
    <strong>This is a strong tag</strong> 
    <br>
    <i>This is an italic tag</i>
    <br>
    <em>This is an emphasis tag</em>
    <br>
    <u>Underline</u>
</body>
</html>
