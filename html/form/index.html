<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Form</title>
  </head>
  <body>
    <h1>HTML Form</h1>
    <form action="submit" method="post">
      <label for="username">Username:</label>
      <input type="text" id="username" /> <br />

      <label for="password">Password:</label>
      <input type="password" id="password" />       <br />


      <label for="email">Email:</label>
      <input type="email" id="email" />       <br />

      <p>Gender</p>
      <input type="radio" id="male" name="gender" value="MALE" />
      <label for="male">Male</label><br />
      <input type="radio" id="female" name="gender" value="FEMALE" />
      <label for="female">Female</label><br />

      <label for="cars">Choose a car:</label>
      <select name="cars" id="cars">
        <option value="" disabled selected>Select Cars</option>
        <option value="volvo">Volvo</option>
        <option value="saab">Saab</option>
        <option value="mercedes">Mercedes</option>
        <option value="audi">Audi</option>
      </select>
      <br />
      <label for="fav_books">Favorite Books:</label>
      <input type="checkbox" value="Math" name="fav_books" id="math"/>
      <label for="math">Math</label>
      <input type="checkbox" value="Science" name="fav_books" /> Science
      <input type="checkbox" value="Computer" name="fav_books" /> Computer <br>

      <input type="submit" value="Submit">
    </form>
  </body>
</html>
